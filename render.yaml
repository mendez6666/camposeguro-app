services:
  - type: web
    name: camposeguro-app
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
  - type: worker
    name: camposeguro-monitor
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python auto_monitor.py
