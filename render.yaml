services:
  - type: web
    name: camposeguro-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIRMS_DAY_RANGE
        value: "1"
      - key: FIRMS_QUERY_DAYS
        value: "5"
      - key: ALERT_WINDOW_HOURS
        value: "24"
      - key: FIRMS_AREA_BBOX
        value: "-70.0,-23.5,-57.0,-9.0"
      - key: FIRMS_SOURCES
        value: "MODIS_NRT,VIIRS_SNPP_NRT,VIIRS_NOAA20_NRT,VIIRS_NOAA21_NRT"
      - key: EMAIL_ENABLED
        value: "false"
      - key: AUTH_ENABLED
        value: "true"
      - key: ADMIN_USER
        value: "admin"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_SESSION_HOURS
        value: "12"